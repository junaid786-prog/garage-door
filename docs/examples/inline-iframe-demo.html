<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Service - Inline Iframe Demo</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    .container {
      max-width: 650px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #1e3a8a;
      margin-bottom: 10px;
    }
    .info {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .booking-iframe {
      width: 100%;
      height: 800px;
      border: 1px solid #ddd;
      border-radius: 12px;
      display: block;
    }
    @media (max-width: 768px) {
      .container { padding: 20px; }
      .booking-iframe { height: 90vh; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Book Your Garage Door Service</h1>
    <p class="info">
      Complete the booking form below to schedule your appointment.
      Our licensed technicians provide same-day service for most repairs.
    </p>

    <!-- Inline Iframe Embed -->
    <iframe
      src="http://localhost:5173?apiUrl=http://localhost:3000&apiKey=garage-door-api-key-2026"
      class="booking-iframe"
      title="A1 Garage Door Booking"
      frameborder="0"
      allowtransparency="true"
    ></iframe>
  </div>

  <!-- Optional: Dynamic height adjustment -->
  <script>
    const iframe = document.querySelector('.booking-iframe');

    // Listen for height updates from widget
    window.addEventListener('message', (event) => {
      // Security: verify origin
      if (event.origin !== 'http://localhost:5173') return;

      if (event.data.type === 'A1_HEIGHT_UPDATE') {
        iframe.style.height = event.data.height + 'px';
        console.log('Updated iframe height:', event.data.height);
      }
    });
  </script>
</body>
</html>
